<div class="position-relative" style="max-width: 720px; margin: 0 auto;">
  <!-- Search Input -->
  <div class="d-flex align-items-center gap-3">
    <input
      type="search"
      class="form-control rounded-pill border-0 shadow-sm flex-grow-1"
      placeholder="Search for products and brands here..."
      aria-label="Search products"
      style="height: 56px;"
      [(ngModel)]="query"
      (input)="onInputChange()"
      (keyup.enter)="onSearch()"
      (focus)="updateSuggestions()"
      (blur)="onBlur()"
    />

    <!-- Orange Cube Button -->
    <div
      (click)="onSearch()"
      style="
        width: 56px;
        height: 56px;
        background-color: #ffba00;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        cursor: pointer;
      "
    >
      <i class="bi bi-search text-dark fs-4"></i>
    </div>
  </div>

  <!-- Suggestions Dropdown -->
  <div
    *ngIf="showSuggestions"
    class="position-absolute w-100 bg-white shadow rounded mt-1"
    style="z-index: 1050; max-height: 320px; overflow-y: auto;"
  >
    <div class="list-group list-group-flush">
      <button
        *ngFor="let product of suggestions"
        class="list-group-item list-group-item-action d-flex align-items-center py-2 px-3 border-0"
        (mousedown)="selectSuggestion(product)"
      >
        <img [src]="product.imageUrl" alt="" width="40" height="40" class="rounded me-3" style="object-fit: cover;">
        <div>
          <div class="fw-medium">{{ product.name }}</div>
          <small class="text-muted">{{ product.category }} • {{ product.brand }}</small>
        </div>
        <span class="ms-auto fw-bold text-warning">₦{{ product.price | number }}</span>
      </button>
    </div>
  </div>
</div>
