<!-- Start Filter Bar -->
<div class="filter-bar d-flex flex-wrap align-items-center mb-4">
  <div class="sorting">
    <select class="form-select" (change)="onSortChange($event)">
      <option value="default">Default sorting</option>
      <option value="price-low">Price: Low to High</option>
      <option value="price-high">Price: High to Low</option>
      <option value="name-asc">Name: A to Z</option>
    </select>
  </div>

  <div class="sorting mr-auto">
    <select class="form-select" (change)="onItemsPerPageChange($event)">
      <option value="9">Show 9</option>
      <option value="12" selected>Show 12</option>
      <option value="16">Show 16</option>
      <option value="24">Show 24</option>
    </select>
  </div>

  <!-- Pagination Numbers -->
  <div class="pagination">
    <a
      href="#"
      class="prev-arrow"
      [class.disabled]="currentPage === 1"
      (click)="prevPage($event)"
    >
      <i class="fa fa-long-arrow-left" aria-hidden="true"></i>
    </a>

    <ng-container *ngFor="let page of getVisiblePages()">
      <a
        href="#"
        [class.active]="page === currentPage"
        (click)="goToPage(page, $event)"
      >
        {{ page }}
      </a>
    </ng-container>

    <a href="#" class="dot-dot" *ngIf="totalPages > 5">
      <i class="fa fa-ellipsis-h" aria-hidden="true"></i>
    </a>

    <a
      href="#"
      [class.active]="totalPages === currentPage"
      (click)="goToPage(totalPages, $event)"
      *ngIf="totalPages > 5"
    >
      {{ totalPages }}
    </a>

    <a
      href="#"
      class="next-arrow"
      [class.disabled]="currentPage === totalPages"
      (click)="nextPage($event)"
    >
      <i class="fa fa-long-arrow-right" aria-hidden="true"></i>
    </a>
  </div>
</div>
<!-- End Filter Bar -->

<!-- Start Product Grid -->
<section class="lattest-product-area pb-40 category-list">
  <div class="row">
    <!-- single product -->
    <div class="col-lg-4 col-md-6 mb-4" *ngFor="let prod of paginatedProducts">
      <div class="single-product">
        <img class="img-fluid" [src]="prod.images?.[0]" alt="{{ prod.name }}" />

        <div class="product-details">
          <h6>{{ prod.name }}</h6>
          <div class="price">
            <h6>₦{{ prod.price | number }}</h6>
          </div>
          <div class="prd-bottom">
            <a href="#" class="social-info">
              <span class="ti-bag"></span>
              <p class="hover-text">add to bag</p>
            </a>
            <a href="#" class="social-info">
              <span class="lnr lnr-heart"></span>
              <p class="hover-text">Wishlist</p>
            </a>
            <a href="#" class="social-info">
              <span class="lnr lnr-sync"></span>
              <p class="hover-text">compare</p>
            </a>
            <a [routerLink]="['/product', prod.id]" class="social-info">
              <span class="lnr lnr-move"></span>
              <p class="hover-text">view more</p>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- End Product Grid -->
