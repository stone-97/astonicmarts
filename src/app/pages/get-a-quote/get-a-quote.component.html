<div class="container mt-4">

  <!-- HEADER -->
  <div class="mb-4 text-center">
    <h2>Get a Quote</h2>
    <p>Please fill the form below to request a quote</p>
  </div>
<div class="container mt-4">

  <form [formGroup]="quoteForm" (ngSubmit)="submitQuote()">

    <div class="row">

      <!-- NAME -->
      <div class="col-md-6 mb-3">
        <input type="text" formControlName="name" class="form-control" placeholder="Your Name">
        <small class="text-danger" *ngIf="quoteForm.get('name')?.invalid && quoteForm.get('name')?.touched">
          Name is required
        </small>
      </div>

      <!-- EMAIL -->
      <div class="col-md-6 mb-3">
        <input type="email" formControlName="email" class="form-control" placeholder="Email">
        <small class="text-danger" *ngIf="quoteForm.get('email')?.invalid && quoteForm.get('email')?.touched">
          Enter a valid email
        </small>
      </div>

      <!-- PHONE -->
      <div class="col-md-6 mb-3">
        <input type="text" formControlName="phone" class="form-control" placeholder="Phone">
      </div>

      <!-- ALTERNATE PHONE -->
      <div class="col-md-6 mb-3">
        <input type="text" formControlName="alternatePhone" class="form-control" placeholder="Alternate Phone (Optional)">
      </div>

      <!-- COMPANY NAME -->
      <div class="col-md-12 mb-3">
        <input type="text" formControlName="companyName" class="form-control" placeholder="Company Name (Only for businesses)">
      </div>

      <!-- ADDRESS -->
      <div class="col-md-12 mb-3">
        <input type="text" formControlName="address" class="form-control" placeholder="Address">
        <small class="text-danger" *ngIf="quoteForm.get('address')?.invalid && quoteForm.get('address')?.touched">
          Address is required
        </small>
      </div>

      <!-- CITY -->
      <div class="col-md-6 mb-3">
        <input type="text" formControlName="city" class="form-control" placeholder="City">
        <small class="text-danger" *ngIf="quoteForm.get('city')?.invalid && quoteForm.get('city')?.touched">
          City is required
        </small>
      </div>

      <!-- STATE -->
      <div class="col-md-6 mb-3">
        <input type="text" formControlName="state" class="form-control" placeholder="State">
        <small class="text-danger" *ngIf="quoteForm.get('state')?.invalid && quoteForm.get('state')?.touched">
          State is required
        </small>
      </div>

      <!-- PRODUCT SEARCH -->
      <div class="col-md-6 mb-3">

        <div class="product-search-box">

          <input
            type="text"
            formControlName="product"
            class="form-control"
            placeholder="Search product..."
            (input)="filterProducts($event)"
          >

          <div class="product-dropdown" *ngIf="products.length > 0">

            <div
              class="product-item"
              *ngFor="let p of products"
              (click)="selectProduct(p)"
            >
              {{ p.name }}
            </div>

          </div>

        </div>

        <small class="text-danger"
          *ngIf="quoteForm.get('product')?.invalid && quoteForm.get('product')?.touched">
          Select a product
        </small>

      </div>

      <!-- MESSAGE -->
      <div class="col-md-6 mb-3">
        <textarea formControlName="message" class="form-control" rows="3" placeholder="Message"></textarea>
      </div>

    </div>

    <!-- BUTTON -->
    <button class="btn btn-danger w-100"
      [disabled]="quoteForm.invalid || isSubmitting">

      {{ isSubmitting ? 'Sending...' : 'Get Quote' }}
    </button>

  </form>

  <!-- SUCCESS -->
  <div *ngIf="successMessage" class="alert alert-success mt-3">
    {{ successMessage }}
  </div>

  <!-- ERROR -->
  <div *ngIf="errorMessage" class="alert alert-danger mt-3">
    {{ errorMessage }}
  </div>

</div>
