<div class="container py-5">
      <h2>Search Results for "{{ query }}"</h2>

      <div *ngIf="results.length === 0" class="alert alert-info">
        No products found matching "{{ query }}"
      </div>

      <div class="row">
        <div class="col-md-4 mb-4" *ngFor="let product of results">
          <div class="card h-100">
            <img [src]="product.imageUrl" class="card-img-top" alt="{{ product.name }}" style="height: 200px; object-fit: cover;">
            <div class="card-body">
              <h5 class="card-title">{{ product.name }}</h5>
              <p class="text-muted">{{ product.category }} • {{ product.brand }}</p>
              <p class="fw-bold">₦{{ product.price | number }}</p>
              <button class="btn btn-warning btn-sm">Add to Cart</button>
            </div>
          </div>
        </div>
      </div>
    </div>
